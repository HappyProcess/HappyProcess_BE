name: Deploy to GCP

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: JDK 17 설치
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: gradlew 실행 권한 부여
        run: chmod +x gradlew

      - name: 빌드
        run: ./gradlew build -x test

      - name: Docker Hub 로그인
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 도커 이미지 빌드 & 푸시
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/happyprocess:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/happyprocess:latest

      - name: GCP 서버에 배포
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            cat > ~/docker-compose.prod.yml << 'EOF'
            services:
              app:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/happyprocess:latest
                environment:
                  SPRING_PROFILES_ACTIVE: prod
                  SPRING_DATASOURCE_URL: jdbc:mysql://34.50.59.40:3306/happy-process-mysql
                  SPRING_DATASOURCE_USERNAME: root
                  SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
                  SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
                  SPRING_JPA_HIBERNATE_DDL_AUTO: update
                  JWT_SECRET: ${{ secrets.JWT_SECRET }}
                  JWT_ACCESS_EXPIRATION: ${{ secrets.JWT_ACCESS_EXPIRATION }}
                  JWT_REFRESH_EXPIRATION: ${{ secrets.JWT_REFRESH_EXPIRATION }}
                ports:
                  - "8080:8080"
                restart: always
            EOF
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/happyprocess:latest
            docker compose -f ~/docker-compose.prod.yml up -d